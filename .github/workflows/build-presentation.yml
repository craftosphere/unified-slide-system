name: Build Presentation

on:
  workflow_call:
    inputs:
      theme-ref:
        description: "Git ref (tag, branch, SHA) of the theme repo to check out into theme/"
        required: false
        type: string
        default: ""

env:
  NODE_VERSION: "20"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout presentation repo with theme submodule
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: theme/package-lock.json

      - name: Install dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Markdown lint
        run: npm run --if-present lint:md

      - name: Spell check
        run: npm run --if-present lint:spell

  build:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout presentation repo with theme submodule
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pin theme version
        if: inputs.theme-ref != ''
        working-directory: theme
        run: |
          git fetch origin "${{ inputs.theme-ref }}"
          git checkout FETCH_HEAD

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: theme/package-lock.json

      - name: Install theme dependencies
        working-directory: theme
        run: npm ci --no-audit --no-fund

      - name: Install Chromium for PDF export
        working-directory: theme
        run: npx playwright install --with-deps chromium

      - name: Build all decks under src/
        run: bash theme/scripts/build.sh

      - name: Verify build output
        run: |
          html_count=$(find build -type f -name '*.html' | wc -l | tr -d ' ')
          pdf_count=$(find build -type f -name '*.pdf' | wc -l | tr -d ' ')
          echo "Built ${html_count} HTML and ${pdf_count} PDF file(s):"
          find build -type f \( -name '*.html' -o -name '*.pdf' \) -print
          if [[ "$html_count" -eq 0 ]]; then
            echo "✗ No HTML output produced — build failed."
            exit 1
          fi

      - name: Package build artifact
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          (cd build && zip -r "../${REPO_NAME}.zip" .)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: "*.zip"
          retention-days: 30
          if-no-files-found: error

  release:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" artifacts/**/*.zip --generate-notes
